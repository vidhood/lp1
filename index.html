  box-shadow:

}

/* VIDEO */

.video-box{
  position:relative;
  background:#000;
}

video{
  width:100%;
  max-height:75vh;
  display:block;
  object-fit:contain;
  background:#000;
}

.video-box::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:120px;
  background:linear-gradient(to top,#000000dd,transparent);
  pointer-events:none;
}

/* BADGE */

.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:#ff2f6d;
  padding:8px 12px;
  border-radius:50px;
  font-size:12px;
  font-weight:700;
  z-index:5;

/* INFO */

.video-info{

}

.video-title{

  font-weight:700;
  line-height:1.4;
}

.video-desc{
  margin-top:10px;
  color:#aaa;
  font-size:14px;
  line-height:1.6;
}

.stats{
  display:flex;
  gap:14px;
  margin-top:14px;
  color:#ccc;
  font-size:13px;
  flex-wrap:wrap;
}

/* BUTTONS */

.actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.btn{
  flex:1;
  border:none;
  border-radius:16px;
  padding:15px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}

.btn-primary{
  background:linear-gradient(135deg,#ff2f6d,#ff0066);
  color:#fff;
  box-shadow:0 10px 25px rgba(255,0,102,0.35);
}

.btn-primary:hover{
  transform:translateY(-2px);
}

.btn-secondary{
  background:#1b1b1b;
  color:#fff;
}

/* SECTION */

.section-title{
  padding:18px 16px 10px;
  font-size:18px;
  font-weight:700;
}

/* ADS */

.ads-card{
  margin:12px;
  background:#121212;
  border-radius:20px;
  padding:14px;
  border:1px solid rgba(255,255,255,0.05);

}

.ads-label{
  color:#777;

  letter-spacing:1px;
}

/* FOOTER */

.footer{

  font-size:12px;

/* MOBILE */

@media(max-width:480px){
